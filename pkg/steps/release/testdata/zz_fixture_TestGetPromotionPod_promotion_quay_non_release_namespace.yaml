metadata:
  creationTimestamp: null
  labels:
    ci-operator.openshift.io/save-container-logs: "true"
  name: promotion-quay
  namespace: ci-op-9bdij1f6
spec:
  containers:
  - args:
    - |-
      for r in {1..5}; do
        echo Mirror attempt $r
        if oc image mirror --loglevel=2 --keep-manifest-list --registry-config=/etc/push-secret/.dockerconfigjson --max-per-registry=10 registry.build02.ci.openshift.org/ci-op-y2n8rsh3/pipeline@sha256:bbb=quay.io/openshift/ci:ci_ci_sanitize-prow-jobs_incoming registry.build02.ci.openshift.org/ci-op-y2n8rsh3/pipeline@sha256:aaa=quay.io/openshift/ci:ocp_4.21_ovn-kubernetes_incoming; then break; fi
        if [ "${r}" -eq 5 ]; then
          exit 1
        fi
        backoff=$(($RANDOM % 120))s
        echo Sleeping randomized $backoff before retry
        sleep $backoff
      done
      _HAD_OLD_0=false
      if oc image info --registry-config=/etc/push-secret/.dockerconfigjson quay.io/openshift/ci:ci_ci_sanitize-prow-jobs >/dev/null 2>&1; then _HAD_OLD_0=true; fi
      _HAD_OLD_1=false
      if oc image info --registry-config=/etc/push-secret/.dockerconfigjson quay.io/openshift/ci:ocp_4.21_ovn-kubernetes >/dev/null 2>&1; then _HAD_OLD_1=true; fi
      _BACKUP_PAIRS=""
      if [ "${_HAD_OLD_0}" = "true" ]; then _BACKUP_PAIRS="${_BACKUP_PAIRS}quay.io/openshift/ci:ci_ci_sanitize-prow-jobs=quay.io/openshift/ci:ci_ci_sanitize-prow-jobs__pre "; fi
      if [ "${_HAD_OLD_1}" = "true" ]; then _BACKUP_PAIRS="${_BACKUP_PAIRS}quay.io/openshift/ci:ocp_4.21_ovn-kubernetes=quay.io/openshift/ci:ocp_4.21_ovn-kubernetes__pre "; fi
      if [ -n "${_BACKUP_PAIRS}" ]; then
      for r in {1..5}; do
        echo Mirror attempt $r
        if oc image mirror --loglevel=2 --keep-manifest-list --registry-config=/etc/push-secret/.dockerconfigjson --max-per-registry=10 ${_BACKUP_PAIRS}; then break; fi
        if [ "${r}" -eq 5 ]; then
          exit 1
        fi
        backoff=$(($RANDOM % 120))s
        echo Sleeping randomized $backoff before retry
        sleep $backoff
      done
      fi
      for r in {1..5}; do
        echo Mirror attempt $r
        if oc image mirror --loglevel=2 --keep-manifest-list --registry-config=/etc/push-secret/.dockerconfigjson --max-per-registry=10 quay.io/openshift/ci:ci_ci_sanitize-prow-jobs_incoming=quay.io/openshift/ci:ci_ci_sanitize-prow-jobs quay.io/openshift/ci:ocp_4.21_ovn-kubernetes_incoming=quay.io/openshift/ci:ocp_4.21_ovn-kubernetes; then break; fi
        if [ "${r}" -eq 5 ]; then
          exit 1
        fi
        backoff=$(($RANDOM % 120))s
        echo Sleeping randomized $backoff before retry
        sleep $backoff
      done
      _POST1_PAIRS=""
      if [ "${_HAD_OLD_0}" = "true" ]; then _POST1_PAIRS="${_POST1_PAIRS}quay.io/openshift/ci:ci_ci_sanitize-prow-jobs=quay.io/openshift/ci:ci_ci_sanitize-prow-jobs__post1 "; fi
      if [ "${_HAD_OLD_1}" = "true" ]; then _POST1_PAIRS="${_POST1_PAIRS}quay.io/openshift/ci:ocp_4.21_ovn-kubernetes=quay.io/openshift/ci:ocp_4.21_ovn-kubernetes__post1 "; fi
      if [ -n "${_POST1_PAIRS}" ]; then
      for r in {1..5}; do
        echo Mirror attempt $r
        if oc image mirror --loglevel=2 --keep-manifest-list --registry-config=/etc/push-secret/.dockerconfigjson --max-per-registry=10 ${_POST1_PAIRS}; then break; fi
        if [ "${r}" -eq 5 ]; then
          exit 1
        fi
        backoff=$(($RANDOM % 120))s
        echo Sleeping randomized $backoff before retry
        sleep $backoff
      done
      fi
      for r in {1..5}; do
        _digest=$(oc image info --registry-config=/etc/push-secret/.dockerconfigjson --filter-by-os=linux/amd64 quay.io/openshift/ci:ocp_4.21_ovn-kubernetes | sed -n '/^Digest:[[:space:]]/s/^Digest:[[:space:]]*//p' | head -n1)
        if [ -n "${_digest}" ] && oc tag --source=docker --loglevel=2 --reference-policy='source' --import-mode='PreserveOriginal' --reference quay-proxy.ci.openshift.org/openshift/ci@${_digest} ocp/4.21:ovn-kubernetes; then
          break
        fi
        echo "promotion-quay: digest-tag failed for ocp/4.21:ovn-kubernetes attempt ${r}/5 (QCI digest may have moved after mirror)" >&2
        if [ "${r}" -eq 5 ]; then
          exit 1
        fi
        echo "promotion-quay: retrying digest-tag for ocp/4.21:ovn-kubernetes (attempt $((r+1))/5 after randomized backoff)" >&2
        backoff=$(($RANDOM % 120))s
        sleep "${backoff}"
      done

      set +e
      for r in {1..2}; do echo "Tag attempt $r (all together)"; oc tag --source=docker --loglevel=2 --reference-policy='source' --import-mode='PreserveOriginal' --reference quay-proxy.ci.openshift.org/openshift/ci@sha256:bbb ci/ci-quay:sanitize-prow-jobs && break; :; done
      for r in {1..3}; do echo "Tag attempt $r (individual)"; oc tag --source=docker --loglevel=2 --reference-policy='source' --import-mode='PreserveOriginal' --reference quay-proxy.ci.openshift.org/openshift/ci@sha256:bbb ci/ci-quay:sanitize-prow-jobs && break; backoff=$(($RANDOM % 120))s; echo Sleeping randomized $backoff before retry; sleep $backoff; done
      set -e
    command:
    - /bin/sh
    - -c
    env:
    - name: KUBECONFIG
      value: /etc/app-ci-kubeconfig/kubeconfig
    - name: KUBECACHEDIR
      value: /tmp/.kube/cache
    image: stable:cli
    name: promotion
    resources: {}
    volumeMounts:
    - mountPath: /etc/push-secret
      name: push-secret
      readOnly: true
    - mountPath: /etc/app-ci-kubeconfig
      name: app-ci-kubeconfig
      readOnly: true
  nodeSelector:
    kubernetes.io/arch: amd64
  restartPolicy: Never
  volumes:
  - name: push-secret
    secret:
      secretName: registry-push-credentials-ci-central
  - name: app-ci-kubeconfig
    secret:
      secretName: promotion-quay-tagger-kubeconfig
status: {}
