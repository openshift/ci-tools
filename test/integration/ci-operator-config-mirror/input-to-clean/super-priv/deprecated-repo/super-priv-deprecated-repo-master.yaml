base_images:
  base:
    name: origin-v4.0
    namespace: openshift
    reference_policy:
      type: ""
    tag: base
  os:
    name: centos
    namespace: ocp
    reference_policy:
      type: ""
    tag: os
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    reference_policy:
      type: ""
    tag: golang-1.10
canonical_go_repository: github.com/super/duper
images:
- from: base
  to: test-image
promotion:
  to:
  - name: other-priv
    namespace: ocp-private
resources:
  '*':
    limits:
      cpu: 500Mi
    requests:
      cpu: 10Mi
tag_specification:
  name: origin-v4.0
  namespace: openshift
tests:
- as: unit
  commands: make test-unit
  container:
    from: src
zz_generated_metadata:
  branch: master
  org: super-priv
  repo: deprecated-repo
