base_images:
  base:
    name: origin-v4.0
    namespace: openshift
    tag: base
build_root:
  image_stream_tag:
    name: release
    namespace: openshift
    tag: golang-1.10
prowgen:
  slack_reporter:
  - channel: "#inline-channel"
    job_states_to_report:
    - failure
    - error
    report_template: '{{if eq .Status.State "success"}} :rainbow: Job *{{.Spec.Job}}*
      ended with *{{.Status.State}}*. <{{.Status.URL}}|View logs> :rainbow: {{else}}
      :volcano: Job *{{.Spec.Job}}* ended with *{{.Status.State}}*. <{{.Status.URL}}|View
      logs> :volcano: {{end}}'
    job_names:
    - unit
resources:
  '*':
    limits:
      cpu: 500Mi
    requests:
      cpu: 10Mi
tag_specification:
  name: origin-v4.0
  namespace: openshift
tests:
- as: unit
  commands: make test-unit
  container:
    from: src
- as: e2e
  commands: make test-e2e
  container:
    from: src
zz_generated_metadata:
  branch: master
  org: slack-report-inline
  repo: duper
